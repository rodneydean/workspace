services:
  web:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${GITHUB_REPOSITORY_OWNER:-dealio}/${REPO_NAME:-workspace}/web:${APP_VERSION:-latest}
    container_name: dealio-web
    restart: always
    expose:
      - '3001'
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-main}?schema=public
      - REDIS_URL=redis://redis:6379
      - NEXT_PUBLIC_API_URL=http://api:3000
      - NODE_ENV=production
    networks:
      - dealio-network

  api:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${GITHUB_REPOSITORY_OWNER:-dealio}/${REPO_NAME:-workspace}/api:${APP_VERSION:-latest}
    container_name: dealio-api
    restart: always
    expose:
      - '3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-main}?schema=public
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    networks:
      - dealio-network

  postgres:
    image: postgres:17-alpine
    container_name: dealio-postgres
    restart: always
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-main}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-main}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dealio-network

  redis:
    image: redis:7-alpine
    container_name: dealio-redis
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dealio-network

volumes:
  db_data:
  redis_data:

networks:
  dealio-network:
    driver: bridge
